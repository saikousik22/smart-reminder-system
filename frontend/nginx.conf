server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → FastAPI backend (strip the /api prefix)
    location /api/ {
        proxy_pass         https://smart-reminder-hngqg2hrbdbdg8b6.southindia-01.azurewebsites.net/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Host              smart-reminder-hngqg2hrbdbdg8b6.southindia-01.azurewebsites.net;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    # Proxy /audio/* → FastAPI backend (Twilio audio serving)
    location /audio/ {
        proxy_pass         https://smart-reminder-hngqg2hrbdbdg8b6.southindia-01.azurewebsites.net/audio/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Host              smart-reminder-hngqg2hrbdbdg8b6.southindia-01.azurewebsites.net;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
