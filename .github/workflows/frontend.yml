name: Build & Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: smartreminderregistry.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: smartreminderregistry.azurecr.io/smart-reminder-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Restart Frontend App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp restart --resource-group SHR-DEV --name smart-reminder-frontend
